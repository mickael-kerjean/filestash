<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIM Volume Explorer</title>
    <style id="initial-controls-visibility">#controls-panel{display:none}</style>
    <script>
      (function () {
        const hidden = new URLSearchParams(window.location.search).get("hidden")?.trim().toLowerCase() === "true";
        if (!hidden) {
          const initialStyle = document.getElementById("initial-controls-visibility");
          initialStyle?.remove();
        }
      })();
    </script>
    <link 
      rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous">
    <script type="module" crossorigin src="./assets/index-lF0T6We9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B-8dNuft.css">
  </head>
  
  <body>
    <div class="flex-layout">
      <div id="controls-panel" class="panel">
        <h2 class="controls-item">Qim Volume Explorer</h2>
        <div class="controls-item">
          <form id="source-form" class="row g-2 align-items-center">
            <label for="source-url-input" class="col-12 col-form-label">Source</label>
            <div class="col-12 col-sm">
              <input id="source-url-input" type="text" class="form-control" placeholder="Paste URL" />
            </div>
            <div class="col-12 col-sm-auto d-grid">
              <button id="source-load-button" class="btn btn-secondary" type="submit">Load</button>
            </div>
          </form>
          <p id="source-error" class="mt-2 mb-0"></p>
        </div>
        
        <div class="controls-item">
          <div class="row row-cols-1 g-2">
            <div class="col">
              <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2">
                <label for="ome-zarr-scale-select" class="col-form-label mb-0 text-nowrap">
                  <span class="scale-level-highlight">Current scale</span>
                  <span class="scale-level-highlight">(<span id="ome-zarr-scale-level-value">-</span>)</span>
                  <span
                    id="ome-zarr-scale-loading-indicator"
                    class="scale-loading-indicator"
                    aria-hidden="true"
                    title="Loading scale data"
                  ></span>
                </label>
              </div>
              <div>
              <select id="ome-zarr-scale-select" class="form-select form-select-sm w-auto">
                <option value="auto" selected>Auto</option>
              </select>
            </div>
            </div>
          </div>
          <p id="scale-error" class="mt-2 mb-0"></p>
        </div>

        <div class="controls-item">
          <div class="row row-cols-1 row-cols-lg-3 g-3">
            <div class="col">
              <div class="d-flex align-items-center justify-content-start gap-2 flex-nowrap">
                <label for="backgroundColor" class="col-form-label mb-0 text-nowrap">Background</label>
                <input type="color" id="backgroundColor" class="form-control form-control-color flex-shrink-0" value="#e6e6e6" title="Background color" />
              </div>
            </div>
            <div class="col">
              <div class="d-flex align-items-center justify-content-start gap-2 flex-nowrap">
                <label for="objectColor" class="col-form-label mb-0 text-nowrap">Foreground</label>
                <input type="color" id="objectColor" class="form-control form-control-color flex-shrink-0" value="#00aaff" title="Foreground color" />
              </div>
            </div>
            <div class="col">
              <div class="d-flex align-items-center justify-content-start gap-2 flex-nowrap">
                <label for="showBoundingBox" class="col-form-label mb-0 text-nowrap">Grid</label>
                <div class="d-flex align-items-center gap-2 flex-nowrap">
                  <input type="color" id="boundingBoxColor" class="form-control form-control-color flex-shrink-0" value="#4d4d4d" title="Bounding box color" />
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="showBoundingBox" aria-label="Toggle bounding box" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="controls-item">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <span>View type <span id="slice-view-current" class="slice-view-current"></span></span>
            <div class="btn-group slice-view-buttons" role="group" aria-label="Slice and 3D view controls">
              <button id="Z" type="button" class="btn btn-outline-secondary btn-sm">Z</button>
              <button id="Y" type="button" class="btn btn-outline-secondary btn-sm">Y</button>
              <button id="X" type="button" class="btn btn-outline-secondary btn-sm">X</button>
              <button id="3D" type="button" class="btn btn-outline-secondary btn-sm is-active">3D</button>
            </div>
          </div>

          <div id="slice-selector-panel" class="slice-selector-panel hidden mb-2">
            <div class="d-flex align-items-center gap-2 flex-nowrap">
              <label id="slice-selector-axis" for="slice-selector-slider" class="col-form-label fw-semibold mb-0 text-nowrap">Z</label>
              <span id="slice-selector-min" class="slice-selector-bound">0</span>
              <input id="slice-selector-slider" class="form-range slice-selector-slider" type="range" min="0" max="0" step="1" value="0" />
              <span id="slice-selector-max" class="slice-selector-bound">0</span>
            </div>
          </div>

          <div class="d-flex align-items-center justify-content-between mt-3 mb-2">
            <span>Cropping</span>

          </div>
          
          <div id="crop-row-z" class="d-flex align-items-center gap-2 flex-nowrap">
            <label for="crop-z-min" class="col-form-label fw-semibold mb-0 text-nowrap">Z</label>
            <input id="crop-z-left" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="0" aria-label="Crop Z start index" />
            <div class="flex-grow-1">
              <div class="crop-merged-slider">
                <div class="crop-track"></div>
                <div id="crop-z-fill" class="crop-fill"></div>
                <input id="crop-z-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                <input id="crop-z-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
              </div>
            </div>
            <input id="crop-z-right" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="1" aria-label="Crop Z end index" />
          </div>
          
          <div id="crop-row-y" class="d-flex align-items-center gap-2 flex-nowrap">
            <label for="crop-y-min" class="col-form-label fw-semibold mb-0 text-nowrap">Y</label>
              <input id="crop-y-left" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="0" aria-label="Crop Y start index" />
              <div class="flex-grow-1">
                <div class="crop-merged-slider">
                  <div class="crop-track"></div>
                  <div id="crop-y-fill" class="crop-fill"></div>
                  <input id="crop-y-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                  <input id="crop-y-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
                </div>
              </div>
              <input id="crop-y-right" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="1" aria-label="Crop Y end index" />
            </div>

            <div class="vstack gap-2">
              <div id="crop-row-x" class="d-flex align-items-center gap-2 flex-nowrap">
                <label for="crop-x-min" class="col-form-label fw-semibold mb-0 text-nowrap">X</label>
                <input id="crop-x-left" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="0" aria-label="Crop X start index" />
                <div class="flex-grow-1">
                  <div class="crop-merged-slider">
                    <div class="crop-track"></div>
                    <div id="crop-x-fill" class="crop-fill"></div>
                    <input id="crop-x-min" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="0" />
                    <input id="crop-x-max" class="crop-handle form-range" type="range" min="0" max="1" step="0.001" value="1" />
                  </div>
                </div>
                <input id="crop-x-right" class="crop-dimension-value form-control form-control-sm" type="number" min="0" step="1" value="1" aria-label="Crop X end index" />
              </div>
            </div>
            
            <div class="flex mt-3 gap-2">
              <button id="crop-copy-indeces-button" type="button" class="btn btn-outline-secondary btn-sm">Copy crop coordinates</button>
              <button id="crop-reset-button" type="button" class="btn btn-outline-secondary btn-sm">Reset crop</button>
            </div>
        </div>

      
        <div class="controls-item border rounded-2 overflow-hidden">
          <canvas id="histogram-canvas" width="2048px" height="1024px"></canvas>
        </div>

        <div class="controls-item">
          <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2">
            <label for="global-opacity-slider" class="col-form-label mb-0 text-nowrap">Global opacity</label>
            <input
              id="global-opacity-slider"
                class="form-range opacity-range w-100"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />
          </div>
        </div>
        <button id="screenshot-button" class="btn btn-secondary" type="button">Screenshot</button>
        <div class="hidden">
          <p style="margin: 2px">
            <button id="colorize">Colorize</button>
            <input id="segchannel" type="number" min="0" max="10" step="1" value="0" />
            <select name="Colormap" id="colormap">https%3A%2F%2Fplatform.qim.dk%2Fqim-public%2FLentils%2Flentils.zarr
              <option value="viridis" selected>viridis</option>
              <option value="plasma">plasma</option>
            </select>
            <select name="Feature" id="feature">
              <option value="feature1" selected>f1</option>
              <option value="feature2">f2</option>
            </select>
            <input id="featmin" type="range" min="0" max="100" step="1" value="0" />
            <input id="featmax" type="range" min="0" max="100" step="1" value="100" />
          </p>
          <p style="margin: 2px">
            <button id="rotBtn">Turntable</button>
            <button id="xfBtn">Align</button>
            <button id="resetCamBtn">ResetCam</button>
            <select name="Render mode" id="renderMode">
              <option value="RM" selected>Volumetric</option>
              <option value="PT">Pathtrace</option>
              <option value="MP">Max project</option>
            </select>
            <button id="interpolateBtn">Interpolate</button>
          </p>

          <p>Pathtrace iterations: <span id="counter">0</span></p>

          <p>
            <label for="gammaMin">Gamma Min</label>
            <input id="gammaMin" type="number" min="0" max="255" step="1" value="0" />
            <label for="gammaScale">Gamma Scale</label>
            <input id="gammaScale" type="number" min="0" max="255" step="1" value="128" />
            <label for="gammaMax">Gamma Max</label>
            <input id="gammaMax" type="number" min="0" max="255" step="1" value="255" />
          </p>

          <p style="margin: 2px">
            <button id="flipXBtn">FlipX</button>
            <button id="flipYBtn">FlipY</button>
            <button id="flipZBtn">FlipZ</button>
            <label for="zSlider">Z-Slice</label>
            <button id="zbackBtn">Z Back</button>
            <button id="zforwardBtn">Z Forward</button>
            <input id="zSlider" type="range" min="0" max="0" step="1" value="0" />
            <input type="number" id="zValue" min="0" max="0" value="0" />
          </p>

          <button id="playBtn">Play</button>
          <button id="pauseBtn">Pause</button>
          <button id="backBtn">Back</button>
          <button id="forwardBtn">Forward</button>
          <input id="timeSlider" type="range" min="0" max="0" step="1" value="0" />
          <input type="number" id="timeValue" min="0" max="0" value="0" />
          <input type="number" id="sceneValue" min="0" max="0" value="0" />
        </div>
      </div>
      <div id="viewer-panel" class="panel">
        <div id="volume-loading-overlay" class="volume-loading-overlay" aria-hidden="true">
          <div class="volume-loading-overlay-content" role="status" aria-live="polite">
            <span class="volume-loading-overlay-spinner" aria-hidden="true"></span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
